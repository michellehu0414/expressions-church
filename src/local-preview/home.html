<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home Preview</title>
</head>

<body>
    <header>
        <h1>home Preview</h1>
    </header>
    <!-- 🔥 Dynamic Content Section -->
    <div id="values-section"></div>
    <script>
        // Fetch the HTML from the file
        fetch("../html/values-section.html")
            .then(response => {
                if (!response.ok) {
                    throw new Error("Network response was not ok: " + response.statusText);
                }
                return response.text();
            })
            .then(html => {
                // Insert the fetched HTML into the element with ID "values-section"
                document.getElementById("values-section").innerHTML = html;
            })
            .catch(error => {
                console.error("There was a problem fetching the HTML:", error);
            });
    </script>
