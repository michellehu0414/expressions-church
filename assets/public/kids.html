<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>kids Preview</title><link rel="stylesheet" href="../assets/css/kids.css"></head><body><header><h1>kids Preview</h1></header><div id="content"></div><script>fetch("../html/")
            .then(response => response.text())
            .then(html => {
                // Use regex to extract all kids-*.html files
                const matches = [...html.matchAll(/kids-[\w-]+\.html/g)];
                const blocks = matches.map(m => m[0]);

                // Fetch & insert each block dynamically
                blocks.forEach(block => {
                    fetch(`../html/${block}`)
                        .then(response => response.text())
                        .then(data => {
                            const section = document.createElement("div");
                            section.innerHTML = data;
                            document.getElementById("content").appendChild(section);
                        });
                });
            });</script><script src="../assets/js/kids.js"></script><script defer="defer" src="../js/global.js"></script><script defer="defer" src="../js/about.js"></script><script defer="defer" src="../js/community.js"></script><script defer="defer" src="../js/events.js"></script><script defer="defer" src="../js/fire-relief.js"></script><script defer="defer" src="../js/get-involved.js"></script><script defer="defer" src="../js/give.js"></script><script defer="defer" src="../js/home.js"></script><script defer="defer" src="../js/kids.js"></script><script defer="defer" src="../js/leadership.js"></script><script defer="defer" src="../js/serve-sgv.js"></script><script defer="defer" src="../js/teachings.js"></script><script defer="defer" src="../js/visit.js"></script></body></html>
